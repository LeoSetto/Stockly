<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0C0F14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Stockly</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0C0F14;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0C0F14;
      transition: opacity .4s ease, transform .4s ease;
    }

    #splash.hide {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    /* Logo container */
    .splash-logo {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
    }

    /* Glow ring behind logo */
    .splash-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2px solid rgba(240, 160, 80, 0.15);
      animation: ringPulse 2s ease-in-out infinite;
    }

    .splash-ring::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(240, 160, 80, 0.08);
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.6; }
    }

    /* Ambient glow */
    .splash-glow {
      position: absolute;
      width: 200px;
      height: 200px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(240, 160, 80, 0.12) 0%, transparent 70%);
      animation: glowPulse 2.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    }

    /* SVG logo animation */
    .splash-logo svg {
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 4px 24px rgba(240, 160, 80, 0.4));
    }

    .bolt-1 {
      animation: boltIn .6s cubic-bezier(.4,0,.2,1) both;
    }

    .bolt-2 {
      animation: boltIn .6s cubic-bezier(.4,0,.2,1) .15s both;
    }

    @keyframes boltIn {
      0% { opacity: 0; transform: translateY(-20px); }
      60% { opacity: 1; transform: translateY(3px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Text */
    .splash-name {
      font-family: 'Sora', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, #F0A050, #FFD700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      opacity: 0;
      animation: textUp .5s cubic-bezier(.4,0,.2,1) .3s both;
    }

    .splash-sub {
      font-family: 'DM Sans', -apple-system, sans-serif;
      font-size: 13px;
      color: rgba(156, 163, 184, 0.6);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-top: 8px;
      opacity: 0;
      animation: textUp .5s cubic-bezier(.4,0,.2,1) .45s both;
    }

    @keyframes textUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Loading dots */
    .splash-dots {
      display: flex;
      gap: 6px;
      margin-top: 40px;
      opacity: 0;
      animation: textUp .4s ease .6s both;
    }

    .splash-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #F0A050;
      animation: dotBounce 1.2s ease-in-out infinite;
    }

    .splash-dots span:nth-child(2) { animation-delay: .15s; }
    .splash-dots span:nth-child(3) { animation-delay: .3s; }

    @keyframes dotBounce {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }

    /* Preload fonts */
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&family=Sora:wght@700;800&display=swap');

    /* App root hidden until ready */
    #root {
      opacity: 0;
      transition: opacity .3s ease;
    }

    #root.ready {
      opacity: 1;
    }
  </style>
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash">
    <div class="splash-glow"></div>
    <div class="splash-logo">
      <div class="splash-ring"></div>
      <svg width="120" height="120" viewBox="0 0 64 64" fill="none">
        <path class="bolt-1" d="M20 4L36 4L20 32L28 32L12 60L20 60L4 32L12 32L20 4Z" fill="#F0A050"/>
        <path class="bolt-2" d="M32 4L48 4L32 32L40 32L24 60L32 60L16 32L24 32L32 4Z" fill="#F0A050" opacity="0.5"/>
      </svg>
    </div>
    <div class="splash-name">Stockly</div>
    <div class="splash-sub">gestão doméstica</div>
    <div class="splash-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <!-- App -->
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Hide splash when app is ready
    function hideSplash() {
      const splash = document.getElementById('splash');
      const root = document.getElementById('root');
      if (splash) splash.classList.add('hide');
      if (root) root.classList.add('ready');
      setTimeout(() => { if (splash) splash.remove(); }, 500);
    }

    // Wait for React to render, then hide splash
    const observer = new MutationObserver((mutations, obs) => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        // Give a tiny extra moment for paint
        setTimeout(hideSplash, 200);
        obs.disconnect();
      }
    });

    observer.observe(document.getElementById('root'), { childList: true });

    // Fallback: hide after 4s no matter what
    setTimeout(hideSplash, 4000);
  </script>
</body>
</html>
